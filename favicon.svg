<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#C9A84C"/>
      <stop offset="50%"  stop-color="#F5E6C8"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
  </defs>
  <!-- Dark background with rounded corners -->
  <rect width="64" height="64" rx="12" fill="#080808"/>
  <!-- Gold border -->
  <rect width="64" height="64" rx="12" fill="none" stroke="url(#g)" stroke-width="2.5"/>
  <!-- "L" letterform centred -->
  <text x="12" y="50" font-family="'Arial Black', sans-serif" font-size="44" font-weight="900" fill="url(#g)">L</text>
</svg>
